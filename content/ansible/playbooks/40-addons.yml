---
# Day-2 essentials. Each block is wizard-toggleable.
- name: Cluster add-ons
  hosts: localhost
  connection: local
  vars:
    kubeconfig: "{{ playbook_dir }}/../../runs/kubeconfig"
  tasks:
    - name: Add helm repos
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
      loop:
        - { name: kube-vip,             url: "https://kube-vip.github.io/helm-charts" }
        - { name: ingress-nginx,        url: "https://kubernetes.github.io/ingress-nginx" }
        - { name: jetstack,             url: "https://charts.jetstack.io" }
        - { name: prometheus-community, url: "https://prometheus-community.github.io/helm-charts" }
        - { name: argo,                 url: "https://argoproj.github.io/argo-helm" }

    - name: Install kube-vip
      kubernetes.core.helm:
        name: kube-vip
        chart_ref: kube-vip/kube-vip
        release_namespace: kube-system
        kubeconfig: "{{ kubeconfig }}"
        values_files: ["../../manifests/helm/kube-vip/values.yaml.tmpl"]
      when: kube_vip is defined

    - name: Install ingress-nginx
      kubernetes.core.helm:
        name: ingress-nginx
        chart_ref: ingress-nginx/ingress-nginx
        release_namespace: ingress-nginx
        create_namespace: true
        kubeconfig: "{{ kubeconfig }}"
        values_files: ["../../manifests/helm/ingress-nginx/values.yaml.tmpl"]
      when: addons_ingress | default('ingress-nginx') == 'ingress-nginx'

    - name: Install cert-manager
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        release_namespace: cert-manager
        create_namespace: true
        kubeconfig: "{{ kubeconfig }}"
        values_files: ["../../manifests/helm/cert-manager/values.yaml.tmpl"]
      when: addons_cert_manager | default(true)

    - name: Install kube-prometheus-stack
      kubernetes.core.helm:
        name: kube-prometheus-stack
        chart_ref: prometheus-community/kube-prometheus-stack
        release_namespace: monitoring
        create_namespace: true
        kubeconfig: "{{ kubeconfig }}"
        values_files: ["../../manifests/helm/kube-prometheus-stack/values.yaml.tmpl"]
      when: addons_monitoring | default('kube-prometheus-stack') == 'kube-prometheus-stack'

    - name: Install Argo CD
      kubernetes.core.helm:
        name: argocd
        chart_ref: argo/argo-cd
        release_namespace: argocd
        create_namespace: true
        kubeconfig: "{{ kubeconfig }}"
      when: addons_gitops | default('none') == 'argocd'
